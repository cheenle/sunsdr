<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0d1525"/>
    </linearGradient>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0f2440"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a5a3a"/>
      <stop offset="100%" style="stop-color:#163820"/>
    </linearGradient>
    <linearGradient id="dspGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a3a1a"/>
      <stop offset="100%" style="stop-color:#2a2010"/>
    </linearGradient>
    <linearGradient id="radioGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a1a3a"/>
      <stop offset="100%" style="stop-color:#301020"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b9bd5"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6bcf7f"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e8a840"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#5b9bd5" font-size="18" font-weight="700">SunMRRC System Architecture</text>
  <text x="450" y="50" text-anchor="middle" fill="#6a7a8a" font-size="11">SunSDR2 DX Mobile Remote Radio Control — V1.0 (SDD V3.4)</text>

  <!-- ===== BROWSER LAYER ===== -->
  <rect x="30" y="65" width="840" height="130" rx="10" fill="url(#browserGrad)" stroke="#3a6a9c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="88" fill="#6a9acf" font-size="14" font-weight="700">📱 Mobile Browser (iOS Safari / Chrome)</text>

  <!-- Browser components -->
  <rect x="50" y="100" width="150" height="35" rx="6" fill="#0f2440" stroke="#3a6a9c" stroke-width="0.8"/>
  <text x="125" y="122" text-anchor="middle" fill="#8ab4e0" font-size="10">index.html / mobile.css</text>

  <rect x="215" y="100" width="150" height="35" rx="6" fill="#0f2440" stroke="#3a6a9c" stroke-width="0.8"/>
  <text x="290" y="122" text-anchor="middle" fill="#8ab4e0" font-size="10">controls.js / mobile.js</text>

  <rect x="380" y="100" width="150" height="35" rx="6" fill="#0f2440" stroke="#3a6a9c" stroke-width="0.8"/>
  <text x="455" y="122" text-anchor="middle" fill="#8ab4e0" font-size="10">TX EQ + AudioWorklet</text>

  <rect x="545" y="100" width="140" height="35" rx="6" fill="#0f2440" stroke="#3a6a9c" stroke-width="0.8"/>
  <text x="615" y="122" text-anchor="middle" fill="#8ab4e0" font-size="10">WASM Opus Codec</text>

  <rect x="700" y="100" width="150" height="35" rx="6" fill="#0f2440" stroke="#3a6a9c" stroke-width="0.8"/>
  <text x="775" y="122" text-anchor="middle" fill="#8ab4e0" font-size="10">PTT Manager + Safety</text>

  <!-- Browser sub-items -->
  <text x="50" y="158" fill="#5a8abc" font-size="9">Web Audio API · WebSocket (WSS) · getUserMedia mic · Canvas waterfall · Service Worker</text>
  <text x="50" y="175" fill="#5a8abc" font-size="9">TX EQ presets: DEFAULT/MEDIUM/STRONG/RAGCHEW · Compressor 3:1 · Preamp ×1.5</text>

  <!-- ===== CONNECTION LINES: Browser → Server ===== -->
  <line x1="150" y1="195" x2="150" y2="235" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="350" y1="195" x2="350" y2="235" stroke="#6bcf7f" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="550" y1="195" x2="550" y2="235" stroke="#e8a840" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="750" y1="195" x2="750" y2="235" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Protocol labels -->
  <text x="100" y="220" fill="#5b9bd5" font-size="9">HTTPS/WSS</text>
  <text x="310" y="220" fill="#6bcf7f" font-size="9">WSaudioRX/TX</text>
  <text x="505" y="220" fill="#e8a840" font-size="9">WSCTRX</text>
  <text x="700" y="220" fill="#5b9bd5" font-size="9">WSspectrum</text>

  <!-- ===== SERVER LAYER ===== -->
  <rect x="30" y="240" width="840" height="155" rx="10" fill="url(#serverGrad)" stroke="#4a8a5a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="265" fill="#6bcf7f" font-size="14" font-weight="700">🖥️  FastAPI SunMRRC Server (server.py)</text>

  <rect x="50" y="278" width="190" height="35" rx="6" fill="#163820" stroke="#4a8a5a" stroke-width="0.8"/>
  <text x="145" y="300" text-anchor="middle" fill="#6bcf7f" font-size="10">Static File Serving</text>

  <rect x="255" y="278" width="190" height="35" rx="6" fill="#163820" stroke="#4a8a5a" stroke-width="0.8"/>
  <text x="350" y="300" text-anchor="middle" fill="#6bcf7f" font-size="10">/WSCTRX Control Loop</text>

  <rect x="460" y="278" width="190" height="35" rx="6" fill="#163820" stroke="#4a8a5a" stroke-width="0.8"/>
  <text x="555" y="300" text-anchor="middle" fill="#6bcf7f" font-size="10">IQ Processing Loop</text>

  <rect x="665" y="278" width="190" height="35" rx="6" fill="#163820" stroke="#4a8a5a" stroke-width="0.8"/>
  <text x="760" y="300" text-anchor="middle" fill="#6bcf7f" font-size="10">TLS + Auth Midware</text>

  <rect x="50" y="323" width="190" height="30" rx="6" fill="#163820" stroke="#4a8a5a" stroke-width="0.8"/>
  <text x="145" y="343" text-anchor="middle" fill="#9adfaf" font-size="9">Audio fan-out (Opus/PCM)</text>

  <rect x="255" y="323" width="190" height="30" rx="6" fill="#163820" stroke="#4a8a5a" stroke-width="0.8"/>
  <text x="350" y="343" text-anchor="middle" fill="#9adfaf" font-size="9">Mic ingress → TXModulator</text>

  <rect x="460" y="323" width="190" height="30" rx="6" fill="#163820" stroke="#4a8a5a" stroke-width="0.8"/>
  <text x="555" y="343" text-anchor="middle" fill="#9adfaf" font-size="9">Spectrum quantize + S-meter</text>

  <rect x="665" y="323" width="190" height="30" rx="6" fill="#163820" stroke="#4a8a5a" stroke-width="0.8"/>
  <text x="760" y="343" text-anchor="middle" fill="#9adfaf" font-size="9">/api/band_power + mem_channels</text>

  <!-- TX pacer thread -->
  <rect x="50" y="360" width="380" height="28" rx="6" fill="#1a3a1a" stroke="#4a8a5a" stroke-width="0.8"/>
  <text x="240" y="379" text-anchor="middle" fill="#8acf9a" font-size="9">TX Pacer Thread: adaptive ±15% pacing @ 5.12ms/pkt · jitter buffer (prime 24/reprime 12)</text>

  <!-- ===== CONNECTION: Server → DSP ===== -->
  <line x1="450" y1="395" x2="450" y2="425" stroke="#e8a840" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- ===== SHARED DSP LAYER ===== -->
  <rect x="145" y="430" width="610" height="80" rx="10" fill="url(#dspGrad)" stroke="#8a7a3a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="165" y="453" fill="#e8a840" font-size="14" font-weight="700">🧮 Shared DSP + Protocol Modules (../web_control/)</text>

  <rect x="165" y="465" width="140" height="35" rx="6" fill="#2a2010" stroke="#8a7a3a" stroke-width="0.8"/>
  <text x="235" y="488" text-anchor="middle" fill="#e8a840" font-size="10">StreamProcessor</text>

  <rect x="320" y="465" width="140" height="35" rx="6" fill="#2a2010" stroke="#8a7a3a" stroke-width="0.8"/>
  <text x="390" y="488" text-anchor="middle" fill="#e8a840" font-size="10">TXModulator (SSB)</text>

  <rect x="475" y="465" width="140" height="35" rx="6" fill="#2a2010" stroke="#8a7a3a" stroke-width="0.8"/>
  <text x="545" y="488" text-anchor="middle" fill="#e8a840" font-size="10">AudioDemodulator</text>

  <rect x="630" y="465" width="110" height="35" rx="6" fill="#2a2010" stroke="#8a7a3a" stroke-width="0.8"/>
  <text x="685" y="488" text-anchor="middle" fill="#e8a840" font-size="10">Opus Codec</text>

  <!-- ===== CONNECTION: DSP → Radio ===== -->
  <line x1="450" y1="510" x2="450" y2="540" stroke="#cf6b8f" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ===== RADIO LAYER ===== -->
  <rect x="200" y="545" width="500" height="65" rx="10" fill="url(#radioGrad)" stroke="#9a3a6a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="568" fill="#cf6b8f" font-size="14" font-weight="700">📡 SunSDR2 DX Hardware</text>

  <rect x="220" y="578" width="140" height="25" rx="6" fill="#301020" stroke="#9a3a6a" stroke-width="0.8"/>
  <text x="290" y="596" text-anchor="middle" fill="#df8ab0" font-size="9">UDP :50001 Control</text>

  <rect x="380" y="578" width="140" height="25" rx="6" fill="#301020" stroke="#9a3a6a" stroke-width="0.8"/>
  <text x="450" y="596" text-anchor="middle" fill="#df8ab0" font-size="9">UDP :50002 IQ Stream</text>

  <rect x="540" y="578" width="140" height="25" rx="6" fill="#301020" stroke="#9a3a6a" stroke-width="0.8"/>
  <text x="610" y="596" text-anchor="middle" fill="#df8ab0" font-size="9">0x1F00 Telemetry</text>

  <!-- Bottom info -->
  <text x="450" y="635" text-anchor="middle" fill="#4a5a6a" font-size="9">192.168.16.100:50001/50002 → 192.168.16.200:50001/50002 · TX: 0xFFFD @ 195 pkt/s · RX: 0xFFFE @ 78 kS/s</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0d1525"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bg)" rx="10"/>

  <text x="400" y="28" text-anchor="middle" fill="#5b9bd5" font-size="16" font-weight="700">0x1F00 TX Telemetry — Verified Field Offsets</text>
  <text x="400" y="44" text-anchor="middle" fill="#6a7a8a" font-size="10">Reverse-engineered from real 40m drive sweep (expert_40m_drive.pcap) — 2026-06-25</text>

  <!-- Packet layout header -->
  <rect x="40" y="60" width="720" height="30" rx="5" fill="#1a2a3a" stroke="#3a5a7a" stroke-width="0.8"/>
  <text x="400" y="80" text-anchor="middle" fill="#9abfdf" font-size="10">34-byte packet: 0xFF32 header (10B) + 0x1F00 sub-type (seq, flags, …) + data fields</text>

  <!-- Byte offsets visual -->
  <rect x="40" y="100" width="720" height="50" rx="5" fill="#0f1a2a" stroke="#2a4a6a" stroke-width="0.5"/>
  <text x="55" y="120" fill="#6a8aaa" font-size="9">byte:</text>
  <text x="105" y="120" fill="#6a8aaa" font-size="9">0</text>
  <text x="230" y="120" fill="#6a8aaa" font-size="9">10</text>
  <text x="360" y="120" fill="#6a8aaa" font-size="9">16</text>
  <text x="430" y="120" fill="#6a8aaa" font-size="9">18</text>
  <text x="500" y="120" fill="#6a8aaa" font-size="9">22</text>
  <text x="580" y="120" fill="#6a8aaa" font-size="9">26</text>
  <text x="650" y="120" fill="#6a8aaa" font-size="9">30</text>
  <text x="720" y="120" fill="#6a8aaa" font-size="9">34</text>

  <rect x="90" y="130" width="130" height="14" rx="3" fill="#0a1515"/>
  <text x="155" y="141" text-anchor="middle" fill="#5a8a8a" font-size="8">header (0xFF32)</text>

  <rect x="225" y="130" width="125" height="14" rx="3" fill="#0a1515"/>
  <text x="287" y="141" text-anchor="middle" fill="#5a8a8a" font-size="8">seq, flags, unknown</text>

  <rect x="355" y="130" width="20" height="14" rx="3" fill="#cf6a4a"/>
  <text x="365" y="141" text-anchor="middle" fill="#ffcfaf" font-size="8">16</text>

  <rect x="400" y="130" width="45" height="14" rx="3" fill="#0a1515"/>
  <text x="422" y="141" text-anchor="middle" fill="#5a8a8a" font-size="8">unknown</text>

  <rect x="490" y="130" width="85" height="14" rx="3" fill="#0a1515"/>
  <text x="532" y="141" text-anchor="middle" fill="#5a8a8a" font-size="8">avg fwd power</text>

  <rect x="575" y="130" width="65" height="14" rx="3" fill="#6a4a3a"/>
  <text x="607" y="141" text-anchor="middle" fill="#dfae8a" font-size="8">placeholder</text>

  <rect x="645" y="130" width="65" height="14" rx="3" fill="#3a6a3a"/>
  <text x="677" y="141" text-anchor="middle" fill="#6bcf7f" font-size="8">forward W</text>

  <!-- Verified fields -->
  <rect x="40" y="165" width="230" height="60" rx="6" fill="#1a2a15" stroke="#3a6a3a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="55" y="185" fill="#6bcf7f" font-size="12" font-weight="700">✅ off30: f32 Forward Watts</text>
  <text x="55" y="203" fill="#8acf9a" font-size="9">Monotonic with DRIVE: 28%→3W, 71%→54W,</text>
  <text x="55" y="218" fill="#8acf9a" font-size="9">88%→83W, 100%→101W. Direct float — no fit.</text>

  <rect x="285" y="165" width="230" height="60" rx="6" fill="#1a2015" stroke="#4a6a3a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="300" y="185" fill="#6bcf7f" font-size="12" font-weight="700">✅ off16: u16 Supply Volts ×10</text>
  <text x="300" y="203" fill="#8acf9a" font-size="9">~136 (13.6V) idle → sags as power rises.</text>
  <text x="300" y="218" fill="#8acf9a" font-size="9">Correlation with watts = -0.79 (PSU sag).</text>

  <rect x="530" y="165" width="230" height="60" rx="6" fill="#1a2015" stroke="#4a6a3a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="545" y="185" fill="#6bcf7f" font-size="12" font-weight="700">✅ off18: f32 PA Temp °C</text>
  <text x="545" y="203" fill="#8acf9a" font-size="9">~42°C, barely moves with drive. Monitors</text>
  <text x="545" y="218" fill="#8acf9a" font-size="9">PA thermal state during extended TX.</text>

  <!-- What we DON'T have -->
  <rect x="40" y="240" width="720" height="55" rx="6" fill="#1a1010" stroke="#8a3a3a" stroke-width="1.2" filter="url(#sh)"/>
  <text x="55" y="260" fill="#cf6a6a" font-size="12" font-weight="700">❌ NO Reverse-Power Field → NO SWR from Device</text>
  <text x="55" y="278" fill="#9a5a5a" font-size="9">off22 f32 = average forward power (ratio to off30 ≈ 3:1 crest factor), NOT reverse power.</text>
  <text x="55" y="293" fill="#9a5a5a" font-size="9">off26 f32 = always 1.0000 (device placeholder). The device simply does not expose reverse power — use external ATR-1000 tuner for SWR.</text>

  <!-- What was wrong before -->
  <rect x="40" y="305" width="720" height="55" rx="6" fill="#1a1a10" stroke="#8a6a2a" stroke-width="0.8"/>
  <text x="55" y="325" fill="#cfaf4a" font-size="11" font-weight="700">⚠ Previously Wrong (corrected 2026-06-25)</text>
  <text x="55" y="343" fill="#bf9f4a" font-size="9">OLD: off14 u16 + cubic fit (pwr_raw-9)³×1.91e-5 → non-monotonic noise, never tracked real power.</text>
  <text x="55" y="358" fill="#bf9f4a" font-size="9">OLD: off16 u16/100 as "SWR" → actually supply voltage. A stable reading while NOT keyed also rules out SWR.</text>

  <!-- Frontend mapping -->
  <rect x="40" y="370" width="720" height="25" rx="5" fill="#0f1a2a" stroke="#2a4a6a" stroke-width="0.5"/>
  <text x="400" y="387" text-anchor="middle" fill="#6a8aaa" font-size="9">Frontend: getTXTelem:watts,volts,temp → UI shows W · VOLT · TEMP (former SWR field replaced by VOLT)</text>
</svg>

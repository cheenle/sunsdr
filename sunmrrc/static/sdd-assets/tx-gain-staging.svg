<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14"/>
      <stop offset="100%" style="stop-color:#0d1220"/>
    </linearGradient>
    <linearGradient id="clientBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3050"/>
      <stop offset="100%" style="stop-color:#0f1c30"/>
    </linearGradient>
    <linearGradient id="serverBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a30"/>
      <stop offset="100%" style="stop-color:#0f2a1c"/>
    </linearGradient>
    <linearGradient id="deviceBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1a20"/>
      <stop offset="100%" style="stop-color:#201010"/>
    </linearGradient>
    <linearGradient id="goodBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3a8f4a"/>
      <stop offset="100%" style="stop-color:#6bcf7f"/>
    </linearGradient>
    <linearGradient id="warnBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8f6a2a"/>
      <stop offset="100%" style="stop-color:#cfaf4a"/>
    </linearGradient>
    <linearGradient id="badBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8f2a2a"/>
      <stop offset="100%" style="stop-color:#cf4a4a"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#5b9bd5"/>
    </marker>
  </defs>

  <rect width="950" height="720" fill="url(#bg)" rx="10"/>

  <!-- Title -->
  <text x="475" y="28" text-anchor="middle" fill="#5b9bd5" font-size="16" font-weight="700">TX Audio Gain Staging — End-to-End</text>
  <text x="475" y="44" text-anchor="middle" fill="#6a7a8a" font-size="10">Client Browser → WebSocket → Server DSP → SunSDR2 DX · AD-012 (2026-06-25)</text>

  <!-- ===== CLIENT SIDE ===== -->
  <rect x="15" y="55" width="920" height="230" rx="8" fill="url(#clientBox)" stroke="#3a6a9c" stroke-width="1.2" filter="url(#sh)"/>
  <text x="30" y="75" fill="#6a9acf" font-size="13" font-weight="700">📱 Client: Browser Web Audio Pipeline</text>

  <!-- Stage boxes -->
  <rect x="30" y="88" width="85" height="40" rx="5" fill="#0f1c30" stroke="#3a6a9c" stroke-width="0.8"/>
  <text x="72" y="105" text-anchor="middle" fill="#9abfdf" font-size="9">Mic Source</text>
  <text x="72" y="120" text-anchor="middle" fill="#5a8abc" font-size="8">48 kHz</text>

  <text x="120" y="111" fill="#5b9bd5" font-size="14">→</text>

  <rect x="135" y="88" width="85" height="40" rx="5" fill="#0f1c30" stroke="#cfaf4a" stroke-width="1.5"/>
  <text x="177" y="105" text-anchor="middle" fill="#e8c860" font-size="9">Preamp</text>
  <text x="177" y="120" text-anchor="middle" fill="#cfaf4a" font-size="8">×1.5 (+3.5dB)</text>

  <text x="225" y="111" fill="#5b9bd5" font-size="14">→</text>

  <rect x="240" y="88" width="85" height="40" rx="5" fill="#0f1c30" stroke="#3a6a9c" stroke-width="0.8"/>
  <text x="282" y="105" text-anchor="middle" fill="#9abfdf" font-size="9">AntiAlias</text>
  <text x="282" y="120" text-anchor="middle" fill="#5a8abc" font-size="8">LP 4.5kHz ×2</text>

  <text x="330" y="111" fill="#5b9bd5" font-size="14">→</text>

  <rect x="345" y="88" width="85" height="40" rx="5" fill="#0f1c30" stroke="#6a9acf" stroke-width="1"/>
  <text x="387" y="105" text-anchor="middle" fill="#9abfdf" font-size="9">EQ Chain</text>
  <text x="387" y="120" text-anchor="middle" fill="#5a8abc" font-size="8">350/1500/2700Hz</text>

  <text x="435" y="111" fill="#5b9bd5" font-size="14">→</text>

  <rect x="450" y="88" width="85" height="40" rx="5" fill="#0f1c30" stroke="#8a6acf" stroke-width="1"/>
  <text x="492" y="105" text-anchor="middle" fill="#bfaedf" font-size="9">Compressor</text>
  <text x="492" y="120" text-anchor="middle" fill="#8a6acf" font-size="8">3:1 thr=-24dB</text>

  <text x="540" y="111" fill="#5b9bd5" font-size="14">→</text>

  <rect x="555" y="88" width="85" height="40" rx="5" fill="#0f1c30" stroke="#8a6acf" stroke-width="0.8"/>
  <text x="597" y="105" text-anchor="middle" fill="#bfaedf" font-size="9">Makeup</text>
  <text x="597" y="120" text-anchor="middle" fill="#8a6acf" font-size="8">×1.6 (+4dB)</text>

  <text x="645" y="111" fill="#5b9bd5" font-size="14">→</text>

  <rect x="660" y="88" width="85" height="40" rx="5" fill="#0f1c30" stroke="#3a6a9c" stroke-width="0.8"/>
  <text x="702" y="105" text-anchor="middle" fill="#9abfdf" font-size="9">NoiseGate</text>
  <text x="702" y="120" text-anchor="middle" fill="#5a8abc" font-size="8">thr=-50dB</text>

  <text x="750" y="111" fill="#5b9bd5" font-size="14">→</text>

  <rect x="765" y="88" width="90" height="40" rx="5" fill="#0f1c30" stroke="#6bcf7f" stroke-width="1.5"/>
  <text x="810" y="105" text-anchor="middle" fill="#8acf9a" font-size="9">AudioWorklet</text>
  <text x="810" y="120" text-anchor="middle" fill="#6bcf7f" font-size="8">48k→16k Int16</text>

  <!-- EQ Presets reference -->
  <rect x="30" y="140" width="200" height="85" rx="5" fill="#0a1525" stroke="#2a4a6a" stroke-width="0.5"/>
  <text x="45" y="157" fill="#6a9acf" font-size="10" font-weight="700">EQ Presets (Peak Gains)</text>
  <text x="45" y="174" fill="#6a8aaa" font-size="8">DEFAULT:     +6 / +8 / -6 dB</text>
  <text x="45" y="189" fill="#6a8aaa" font-size="8">MEDIUM:      +9 / +10 / -12 dB</text>
  <text x="45" y="204" fill="#6a8aaa" font-size="8">STRONG:      +12 / +12 / -18 dB</text>
  <text x="45" y="219" fill="#6a8aaa" font-size="8">RAGCHEW:  lowCut 150Hz · 3:1 comp</text>

  <!-- Opus -->
  <rect x="250" y="140" width="130" height="55" rx="5" fill="#0a1525" stroke="#2a4a6a" stroke-width="0.5"/>
  <text x="265" y="157" fill="#6a9acf" font-size="10" font-weight="700">WASM Opus Encoder</text>
  <text x="265" y="174" fill="#6a8aaa" font-size="8">28 kbps · VBR · FEC 15%</text>
  <text x="265" y="189" fill="#6a8aaa" font-size="8">DTX · HPF off · VOIP mode</text>

  <!-- Level probe point -->
  <rect x="400" y="140" width="180" height="55" rx="5" fill="#0a1525" stroke="#6bcf7f" stroke-width="1"/>
  <text x="415" y="157" fill="#6bcf7f" font-size="10" font-weight="700">📊 Level Probe ①: Client Output</text>
  <text x="415" y="174" fill="#8acf9a" font-size="8">Peak: ~0.5 (healthy headroom)</text>
  <text x="415" y="189" fill="#8acf9a" font-size="8">RMS:  ~0.05</text>

  <!-- WSS label -->
  <rect x="615" y="140" width="155" height="55" rx="5" fill="#0a1525" stroke="#e8a840" stroke-width="1"/>
  <text x="630" y="157" fill="#e8a840" font-size="10" font-weight="700">🌐 /WSaudioTX (WSS)</text>
  <text x="630" y="174" fill="#cfaf6a" font-size="8">Tagged frame: 0x00=PCM</text>
  <text x="630" y="189" fill="#cfaf6a" font-size="8">or 0x01=Opus @ 16kHz</text>

  <!-- Key warning -->
  <rect x="30" y="235" width="890" height="40" rx="5" fill="#1a1010" stroke="#8a3a3a" stroke-width="0.8"/>
  <text x="45" y="253" fill="#cf6a6a" font-size="9">⚠️  CRITICAL: If preamp &gt; 2.0 + STRONG EQ → client peak hits 1.0 → AudioWorklet Int16 clips hard → server tanh oversaturates → voice distortion</text>
  <text x="45" y="268" fill="#8a5a5a" font-size="8">The preamp was reduced from 3.0 → 1.5 on 2026-06-25 specifically to prevent this saturation chain. Device drive (0x0017) controls RF power — not client gain.</text>

  <!-- ===== ARROW TO SERVER ===== -->
  <line x1="475" y1="285" x2="475" y2="310" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="485" y="303" fill="#5b9bd5" font-size="9">Opus decode or PCM passthrough</text>

  <!-- ===== SERVER SIDE ===== -->
  <rect x="15" y="315" width="920" height="210" rx="8" fill="url(#serverBox)" stroke="#4a8a5a" stroke-width="1.2" filter="url(#sh)"/>
  <text x="30" y="335" fill="#6bcf7f" font-size="13" font-weight="700">🖥️  Server: TXModulator DSP Pipeline (dsp.py)</text>

  <!-- Server stages -->
  <rect x="30" y="348" width="100" height="40" rx="5" fill="#0f2a1c" stroke="#4a8a5a" stroke-width="0.8"/>
  <text x="80" y="365" text-anchor="middle" fill="#8acf9a" font-size="9">Resampler</text>
  <text x="80" y="380" text-anchor="middle" fill="#5a9a6a" font-size="8">16k→15625Hz</text>

  <text x="135" y="371" fill="#6bcf7f" font-size="14">→</text>

  <rect x="150" y="348" width="100" height="40" rx="5" fill="#0f2a1c" stroke="#4a8a5a" stroke-width="0.8"/>
  <text x="200" y="365" text-anchor="middle" fill="#8acf9a" font-size="9">Hilbert SSB</text>
  <text x="200" y="380" text-anchor="middle" fill="#5a9a6a" font-size="8">M=256 overlap</text>

  <text x="255" y="371" fill="#cfaf4a" font-size="14">→</text>

  <rect x="270" y="348" width="100" height="40" rx="5" fill="#0f2a1c" stroke="#cfaf4a" stroke-width="1.5"/>
  <text x="320" y="365" text-anchor="middle" fill="#e8c860" font-size="9">↑ Peak +30%</text>
  <text x="320" y="380" text-anchor="middle" fill="#cfaf4a" font-size="8">analytic phase</text>

  <text x="375" y="371" fill="#cf6a6a" font-size="14">→</text>

  <rect x="390" y="348" width="100" height="40" rx="5" fill="#0f2a1c" stroke="#cf6a6a" stroke-width="1.5"/>
  <text x="440" y="365" text-anchor="middle" fill="#df8a8a" font-size="9">Drive Gain</text>
  <text x="440" y="380" text-anchor="middle" fill="#cf6a6a" font-size="8">×3.0 × drive%</text>

  <text x="495" y="371" fill="#6bcf7f" font-size="14">→</text>

  <rect x="510" y="348" width="100" height="40" rx="5" fill="#0f2a1c" stroke="#6bcf7f" stroke-width="1.5"/>
  <text x="560" y="365" text-anchor="middle" fill="#8acf9a" font-size="9">tanh(1.0)</text>
  <text x="560" y="380" text-anchor="middle" fill="#6bcf7f" font-size="8">soft limiter</text>

  <text x="615" y="371" fill="#6bcf7f" font-size="14">→</text>

  <rect x="630" y="348" width="100" height="40" rx="5" fill="#0f2a1c" stroke="#4a8a5a" stroke-width="0.8"/>
  <text x="680" y="365" text-anchor="middle" fill="#8acf9a" font-size="9">24-bit IQ</text>
  <text x="680" y="380" text-anchor="middle" fill="#5a9a6a" font-size="8">pack, jitter buf</text>

  <text x="735" y="371" fill="#6bcf7f" font-size="14">→</text>

  <rect x="745" y="348" width="100" height="40" rx="5" fill="#0f2a1c" stroke="#e8a840" stroke-width="1.5"/>
  <text x="795" y="365" text-anchor="middle" fill="#e8c860" font-size="9">TX Pacer</text>
  <text x="795" y="380" text-anchor="middle" fill="#cfaf6a" font-size="8">5.12ms/pkt</text>

  <!-- Gain staging diagram -->
  <rect x="30" y="400" width="890" height="115" rx="5" fill="#0a1a10" stroke="#2a4a30" stroke-width="0.5"/>
  <text x="45" y="418" fill="#6bcf7f" font-size="11" font-weight="700">Gain Staging Walkthrough (healthy, @ 100% drive)</text>

  <!-- Level bars -->
  <text x="60" y="445" fill="#9abfdf" font-size="9">Stage ① Client Output</text>
  <rect x="180" y="435" width="160" height="14" rx="3" fill="#1a2a3a"/>
  <rect x="180" y="435" width="80" height="14" rx="3" fill="url(#goodBar)"/>
  <text x="350" y="447" fill="#8acf9a" font-size="9">peak 0.50</text>

  <text x="430" y="445" fill="#9abfdf" font-size="9">② After Hilbert</text>
  <rect x="550" y="435" width="160" height="14" rx="3" fill="#1a2a3a"/>
  <rect x="550" y="435" width="104" height="14" rx="3" fill="url(#goodBar)"/>
  <text x="720" y="447" fill="#cfaf4a" font-size="9">peak 0.65</text>

  <text x="60" y="470" fill="#9abfdf" font-size="9">③ After Drive ×3.0</text>
  <rect x="180" y="460" width="160" height="14" rx="3" fill="#1a2a3a"/>
  <rect x="180" y="460" width="156" height="14" rx="3" fill="url(#warnBar)"/>
  <text x="350" y="472" fill="#cfaf4a" font-size="9">peak 1.95</text>

  <text x="430" y="470" fill="#9abfdf" font-size="9">④ After tanh(1.0)</text>
  <rect x="550" y="460" width="160" height="14" rx="3" fill="#1a2a3a"/>
  <rect x="550" y="460" width="154" height="14" rx="3" fill="url(#goodBar)"/>
  <text x="720" y="472" fill="#8acf9a" font-size="9">peak 0.96 (4% reduction)</text>

  <!-- OLD (distorted) comparison -->
  <line x1="45" y1="490" x2="910" y2="490" stroke="#4a3a3a" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="60" y="506" fill="#cf6a6a" font-size="9">OLD (preamp 3.0): ① peak=1.00 → ② peak=1.32 → ③ peak=3.95 → ④ peak=0.999 (75% reduction → HEAVY DISTORTION)</text>

  <!-- ===== ARROW TO DEVICE ===== -->
  <line x1="475" y1="525" x2="475" y2="550" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="485" y="543" fill="#5b9bd5" font-size="9">UDP 0xFFFD @ 195 pkt/s (39063 Hz IQ)</text>

  <!-- ===== DEVICE SIDE ===== -->
  <rect x="15" y="555" width="920" height="90" rx="8" fill="url(#deviceBox)" stroke="#9a3a6a" stroke-width="1.2" filter="url(#sh)"/>
  <text x="30" y="575" fill="#cf6b8f" font-size="13" font-weight="700">📡 SunSDR2 DX: RF Stage</text>

  <rect x="30" y="588" width="140" height="45" rx="5" fill="#201010" stroke="#9a3a6a" stroke-width="0.8"/>
  <text x="100" y="608" text-anchor="middle" fill="#df8ab0" font-size="9">DRIVE (0x0017)</text>
  <text x="100" y="625" text-anchor="middle" fill="#bf6a90" font-size="8">byte = 255 × √(drive%/100)</text>

  <text x="180" y="613" fill="#cf6b8f" font-size="14">→</text>

  <rect x="200" y="588" width="140" height="45" rx="5" fill="#201010" stroke="#9a3a6a" stroke-width="0.8"/>
  <text x="270" y="608" text-anchor="middle" fill="#df8ab0" font-size="9">Per-Band Power</text>
  <text x="270" y="625" text-anchor="middle" fill="#bf6a90" font-size="8">band_power.json</text>

  <text x="350" y="613" fill="#cf6b8f" font-size="14">→</text>

  <rect x="370" y="588" width="140" height="45" rx="5" fill="#201010" stroke="#9a3a6a" stroke-width="0.8"/>
  <text x="440" y="608" text-anchor="middle" fill="#df8ab0" font-size="9">PA + Antenna</text>
  <text x="440" y="625" text-anchor="middle" fill="#bf6a90" font-size="8">No firmware ALC</text>

  <text x="520" y="613" fill="#6bcf7f" font-size="14">→</text>

  <rect x="540" y="588" width="160" height="45" rx="5" fill="#201010" stroke="#6bcf7f" stroke-width="1.5"/>
  <text x="620" y="608" text-anchor="middle" fill="#8acf9a" font-size="9">0x1F00 Telemetry</text>
  <text x="620" y="625" text-anchor="middle" fill="#6bcf7f" font-size="8">off30 f32=W · off16 u16/10=V</text>

  <rect x="720" y="588" width="195" height="45" rx="5" fill="#1a1010" stroke="#8a5a3a" stroke-width="0.8"/>
  <text x="817" y="608" text-anchor="middle" fill="#dfa06a" font-size="9">⚠ No SWR from device</text>
  <text x="817" y="625" text-anchor="middle" fill="#bf8040" font-size="8">Use external tuner for SWR</text>

  <!-- Bottom: key insight -->
  <rect x="15" y="655" width="920" height="55" rx="5" fill="#0d1525" stroke="#2a4a6a" stroke-width="0.5"/>
  <text x="30" y="675" fill="#5b9bd5" font-size="11" font-weight="700">🔑 Key Design Insight</text>
  <text x="30" y="694" fill="#8ab4e0" font-size="9">RF power is controlled ONLY by device DRIVE (0x0017). Client gain (preamp ×1.5 + EQ) sets a healthy digital level. Server gain (×3.0) lifts into the tanh knee. tanh is a safety net, NOT the primary limiter. Turn device drive ↑ for more power, not client gain.</text>
  <text x="30" y="706" fill="#5a8abc" font-size="8">Level probes logged at 1 Hz: "TX chain in:/an:/drv:/lim:" — monitor these to diagnose distortion. Healthy: in peak ~0.5, drv peak ~2.0, lim peak ~0.96.</text>
</svg>
